<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google</title>
  <link rel="icon" href="https://www.google.com/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top-nav" aria-label="Top navigation">
    <nav class="nav-links" aria-label="Google links">
      <a href="https://mail.google.com/" target="_blank" rel="noopener noreferrer">Gmail</a>
      <a href="https://www.google.com/imghp" target="_blank" rel="noopener noreferrer">Images</a>
      <details class="apps-menu">
        <summary class="apps-button" aria-label="Google apps">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </summary>
        <div class="apps-panel" role="menu" aria-label="Google apps menu">
          <a href="https://myaccount.google.com/"><img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt=""><span>Account</span></a>
          <a href="https://www.google.com/"><img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt=""><span>Search</span></a>
          <a href="https://maps.google.com/"><img src="https://upload.wikimedia.org/wikipedia/commons/b/bd/Google_Maps_Logo_2020.svg" alt=""><span>Maps</span></a>
          <a href="https://www.youtube.com/"><img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" alt=""><span>YouTube</span></a>
          <a href="https://play.google.com/"><img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Google_Play_Arrow_logo.svg" alt=""><span>Play</span></a>
          <a href="https://news.google.com/"><img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Google_News_icon.svg" alt=""><span>News</span></a>
          <a href="https://mail.google.com/"><img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Gmail_icon_%282020%29.svg" alt=""><span>Gmail</span></a>
          <a href="https://meet.google.com/"><img src="https://upload.wikimedia.org/wikipedia/commons/9/9b/Google_Meet_icon_%282020%29.svg" alt=""><span>Meet</span></a>
          <a href="https://drive.google.com/"><img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" alt=""><span>Drive</span></a>
          <a href="https://calendar.google.com/"><img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Google_Calendar_icon_%282020%29.svg" alt=""><span>Calendar</span></a>
        </div>
      </details>
      <a class="signin" href="https://accounts.google.com/" target="_blank" rel="noopener noreferrer">Sign in</a>
    </nav>
  </header>

  <main>
    <h1 class="logo" aria-label="Google logo">
      <span class="b">G</span><span class="r">o</span><span class="y">o</span><span class="b">g</span><span class="g">l</span><span class="r">e</span>
    </h1>

    <form class="search-area" action="https://www.google.com/search" method="get">
      <label class="search-shell" for="search-input">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input id="search-input" type="text" name="q" autocomplete="off" aria-label="Search" />
        <span class="mic-icon" aria-hidden="true" title="Search by voice">🎤</span>
        <span class="lens-icon" aria-hidden="true" title="Search by image">📷</span>
      </label>
      <div class="actions">
        <button type="submit">Google Search</button>
        <button type="submit" name="btnI" value="1">I'm Feeling Lucky</button>
      </div>
    </form>
  </main>

  <footer>
    <div class="region">India</div>
    <div class="footer-links">
      <div>
        <a href="https://about.google/" target="_blank" rel="noopener noreferrer">About</a>
        <a href="https://ads.google.com/" target="_blank" rel="noopener noreferrer">Advertising</a>
        <a href="https://www.google.com/business/" target="_blank" rel="noopener noreferrer">Business</a>
        <a href="https://www.google.com/search/howsearchworks/" target="_blank" rel="noopener noreferrer">How Search works</a>
      </div>
      <div>
        <a href="https://policies.google.com/privacy" target="_blank" rel="noopener noreferrer">Privacy</a>
        <a href="https://policies.google.com/terms" target="_blank" rel="noopener noreferrer">Terms</a>
        <a href="https://www.google.com/preferences" target="_blank" rel="noopener noreferrer">Settings</a>
      </div>
    </div>
  </footer>
</body>
</html>
