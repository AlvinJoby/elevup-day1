<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top-nav" aria-label="Top navigation">
    <nav class="nav-links" aria-label="Google links">
      <a href="https://mail.google.com/" target="_blank" rel="noopener noreferrer">Gmail</a>
      <a href="https://www.google.com/imghp" target="_blank" rel="noopener noreferrer">Images</a>
      <a class="apps-button" href="https://www.google.com/intl/en/about/products" target="_blank" rel="noopener noreferrer" aria-label="Google apps">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </a>
      <a class="signin" href="https://accounts.google.com/" target="_blank" rel="noopener noreferrer">Sign in</a>
      <details class="hamburger-wrap">
        <summary aria-label="Open menu">
          <span></span><span></span><span></span>
        </summary>
        <div class="menu-panel" role="menu" aria-label="Quick menu">
          <a href="https://news.google.com/" target="_blank" rel="noopener noreferrer">News</a>
          <a href="https://maps.google.com/" target="_blank" rel="noopener noreferrer">Maps</a>
          <a href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer">YouTube</a>
          <a href="https://drive.google.com/" target="_blank" rel="noopener noreferrer">Drive</a>
          <a href="https://calendar.google.com/" target="_blank" rel="noopener noreferrer">Calendar</a>
          <a href="https://translate.google.com/" target="_blank" rel="noopener noreferrer">Translate</a>
        </div>
      </details>
    </nav>
  </header>

  <main>
    <h1 class="logo" aria-label="Google logo">
      <span class="b">G</span><span class="r">o</span><span class="y">o</span><span class="b">g</span><span class="g">l</span><span class="r">e</span>
    </h1>

    <form class="search-area" action="https://www.google.com/search" method="get" target="_blank">
      <label class="search-shell" for="search-input">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input id="search-input" type="text" name="q" autocomplete="off" aria-label="Search" />
        <span class="mic-icon" aria-hidden="true">🎤</span>
      </label>
      <div class="actions">
        <button type="submit">Google Search</button>
        <button type="submit" name="btnI" value="1">I'm Feeling Lucky</button>
      </div>
    </form>
  </main>

  <footer>
    <div class="region">India</div>
    <div class="footer-links">
      <div>
        <a href="https://about.google/" target="_blank" rel="noopener noreferrer">About</a>
        <a href="https://ads.google.com/" target="_blank" rel="noopener noreferrer">Advertising</a>
        <a href="https://www.google.com/business/" target="_blank" rel="noopener noreferrer">Business</a>
        <a href="https://www.google.com/search/howsearchworks/" target="_blank" rel="noopener noreferrer">How Search works</a>
      </div>
      <div>
        <a href="https://policies.google.com/privacy" target="_blank" rel="noopener noreferrer">Privacy</a>
        <a href="https://policies.google.com/terms" target="_blank" rel="noopener noreferrer">Terms</a>
        <a href="https://www.google.com/preferences" target="_blank" rel="noopener noreferrer">Settings</a>
      </div>
    </div>
  </footer>
</body>
</html>
